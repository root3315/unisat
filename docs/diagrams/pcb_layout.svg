<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <rect width="400" height="400" fill="#0E1117"/>
  <text x="200" y="25" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">OBC Board Layout (90×90mm)</text>
  <!-- PCB outline -->
  <rect x="50" y="40" width="300" height="300" rx="5" fill="#1a3a1a" stroke="#2ecc71" stroke-width="2"/>
  <!-- MCU -->
  <rect x="140" y="130" width="70" height="70" fill="#333" stroke="#ff6b6b" stroke-width="1"/>
  <text x="175" y="170" text-anchor="middle" fill="#ff6b6b" font-size="9">STM32F446</text>
  <!-- Crystal -->
  <rect x="220" y="145" width="30" height="12" fill="#444" stroke="#f9ca24"/>
  <text x="235" y="155" text-anchor="middle" fill="#f9ca24" font-size="7">8MHz</text>
  <!-- Connectors -->
  <rect x="60" y="50" width="40" height="15" fill="#444" stroke="#74b9ff"/>
  <text x="80" y="61" text-anchor="middle" fill="#74b9ff" font-size="7">I2C</text>
  <rect x="60" y="75" width="40" height="15" fill="#444" stroke="#a29bfe"/>
  <text x="80" y="86" text-anchor="middle" fill="#a29bfe" font-size="7">SPI</text>
  <rect x="60" y="100" width="40" height="15" fill="#444" stroke="#4ecdc4"/>
  <text x="80" y="111" text-anchor="middle" fill="#4ecdc4" font-size="7">UART1</text>
  <rect x="60" y="125" width="40" height="15" fill="#444" stroke="#4ecdc4"/>
  <text x="80" y="136" text-anchor="middle" fill="#4ecdc4" font-size="7">UART2</text>
  <!-- SD Card -->
  <rect x="250" y="50" width="60" height="40" fill="#444" stroke="#fd79a8"/>
  <text x="280" y="75" text-anchor="middle" fill="#fd79a8" font-size="8">MicroSD</text>
  <!-- SWD -->
  <rect x="60" y="280" width="50" height="20" fill="#444" stroke="#f9ca24"/>
  <text x="85" y="294" text-anchor="middle" fill="#f9ca24" font-size="7">SWD</text>
  <!-- Power -->
  <rect x="250" y="280" width="60" height="20" fill="#444" stroke="#2ecc71"/>
  <text x="280" y="294" text-anchor="middle" fill="#2ecc71" font-size="7">5V PWR</text>
  <!-- Ground plane note -->
  <text x="200" y="370" text-anchor="middle" fill="#666" font-size="9">4-layer PCB | Layer 2: GND plane | Layer 3: Power plane</text>
</svg>
