<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-label="UniSat supported form factors">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="panelBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#1e40af"/>
    </linearGradient>
    <style><![CDATA[
      .ff-label { font: 600 13px 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; fill: #0f172a; text-anchor: middle; }
      .ff-mass  { font: 500 11px 'Segoe UI', sans-serif; fill: #64748b; text-anchor: middle; }
      .ff-fam   { font: 700 18px 'Segoe UI', sans-serif; fill: #1e293b; }
      .ff-stroke { stroke: #1e293b; stroke-width: 1.2; fill: #f1f5f9; }
      .sol      { fill: url(#panelBlue); stroke: #0f172a; stroke-width: 0.8; }
      .hatch    { stroke: #0f172a; stroke-width: 0.4; }
    ]]></style>
  </defs>

  <rect width="1200" height="420" fill="url(#bgGrad)"/>

  <!-- Title -->
  <g>
    <text x="600" y="34" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#0f172a">Supported form factors</text>
    <text x="600" y="54" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="13" fill="#475569">14 vehicle classes · one code base · one firmware source tree</text>
  </g>

  <!-- Group: CanSat -->
  <g transform="translate(60 90)">
    <text class="ff-fam" x="0" y="0">CanSat</text>
    <line x1="0" y1="10" x2="220" y2="10" stroke="#94a3b8" stroke-width="1"/>
    <!-- cansat_minimal -->
    <g transform="translate(40 100)">
      <ellipse cx="0" cy="-40" rx="16" ry="5" class="ff-stroke"/>
      <rect x="-16" y="-40" width="32" height="60" class="ff-stroke"/>
      <ellipse cx="0" cy="20" rx="16" ry="5" fill="#94a3b8" stroke="#1e293b" stroke-width="1"/>
      <text class="ff-label" y="45">minimal</text>
      <text class="ff-mass"  y="60">≤ 350 g</text>
    </g>
    <!-- cansat_standard -->
    <g transform="translate(110 100)">
      <ellipse cx="0" cy="-28" rx="17" ry="5" class="ff-stroke"/>
      <rect x="-17" y="-28" width="34" height="48" class="ff-stroke"/>
      <ellipse cx="0" cy="20" rx="17" ry="5" fill="#94a3b8" stroke="#1e293b" stroke-width="1"/>
      <text class="ff-label" y="45">standard</text>
      <text class="ff-mass"  y="60">≤ 500 g</text>
    </g>
    <!-- cansat_advanced -->
    <g transform="translate(180 100)">
      <ellipse cx="0" cy="-40" rx="17" ry="5" class="ff-stroke"/>
      <rect x="-17" y="-40" width="34" height="60" class="ff-stroke"/>
      <rect x="-10" y="-20" width="20" height="4" fill="#0ea5e9"/>
      <circle cx="-6" cy="-5" r="3" fill="#fbbf24"/>
      <ellipse cx="0" cy="20" rx="17" ry="5" fill="#94a3b8" stroke="#1e293b" stroke-width="1"/>
      <text class="ff-label" y="45">advanced</text>
      <text class="ff-mass"  y="60">≤ 500 g</text>
    </g>
  </g>

  <!-- Group: CubeSat -->
  <g transform="translate(330 90)">
    <text class="ff-fam" x="0" y="0">CubeSat (CDS Rev. 14)</text>
    <line x1="0" y1="10" x2="620" y2="10" stroke="#94a3b8" stroke-width="1"/>

    <!-- 1U -->
    <g transform="translate(40 130)">
      <rect x="-15" y="-30" width="30" height="30" class="ff-stroke"/>
      <rect x="-12" y="-27" width="24" height="6" class="sol"/>
      <rect x="-12" y="-18" width="24" height="6" class="sol"/>
      <rect x="-12" y="-9"  width="24" height="6" class="sol"/>
      <text class="ff-label" y="15">1U</text>
      <text class="ff-mass"  y="30">≤ 2.0 kg</text>
    </g>
    <!-- 1.5U -->
    <g transform="translate(125 130)">
      <rect x="-15" y="-45" width="30" height="45" class="ff-stroke"/>
      <rect x="-12" y="-42" width="24" height="6" class="sol"/>
      <rect x="-12" y="-33" width="24" height="6" class="sol"/>
      <rect x="-12" y="-24" width="24" height="6" class="sol"/>
      <rect x="-12" y="-15" width="24" height="6" class="sol"/>
      <text class="ff-label" y="15">1.5U</text>
      <text class="ff-mass"  y="30">≤ 3.0 kg</text>
    </g>
    <!-- 2U -->
    <g transform="translate(215 130)">
      <rect x="-15" y="-60" width="30" height="60" class="ff-stroke"/>
      <rect x="-12" y="-57" width="24" height="54" class="sol" opacity="0.7"/>
      <g class="hatch">
        <line x1="-15" y1="-50" x2="15" y2="-50"/>
        <line x1="-15" y1="-40" x2="15" y2="-40"/>
        <line x1="-15" y1="-30" x2="15" y2="-30"/>
        <line x1="-15" y1="-20" x2="15" y2="-20"/>
        <line x1="-15" y1="-10" x2="15" y2="-10"/>
      </g>
      <text class="ff-label" y="15">2U</text>
      <text class="ff-mass"  y="30">≤ 4.0 kg</text>
    </g>
    <!-- 3U (reference) -->
    <g transform="translate(315 130)">
      <rect x="-15" y="-90" width="30" height="90" class="ff-stroke" stroke="#ef4444" stroke-width="1.8"/>
      <rect x="-12" y="-87" width="24" height="84" class="sol" opacity="0.7"/>
      <g class="hatch">
        <line x1="-15" y1="-80" x2="15" y2="-80"/>
        <line x1="-15" y1="-70" x2="15" y2="-70"/>
        <line x1="-15" y1="-60" x2="15" y2="-60"/>
        <line x1="-15" y1="-50" x2="15" y2="-50"/>
        <line x1="-15" y1="-40" x2="15" y2="-40"/>
        <line x1="-15" y1="-30" x2="15" y2="-30"/>
        <line x1="-15" y1="-20" x2="15" y2="-20"/>
        <line x1="-15" y1="-10" x2="15" y2="-10"/>
      </g>
      <!-- antenna -->
      <line x1="0" y1="-90" x2="0" y2="-110" stroke="#1e293b" stroke-width="1"/>
      <circle cx="0" cy="-112" r="2" fill="#ef4444"/>
      <text class="ff-label" y="15">3U ★ ref</text>
      <text class="ff-mass"  y="30">≤ 6.0 kg</text>
    </g>
    <!-- 6U -->
    <g transform="translate(435 130)">
      <rect x="-30" y="-90" width="60" height="90" class="ff-stroke"/>
      <rect x="-27" y="-87" width="54" height="84" class="sol" opacity="0.6"/>
      <!-- deployable solar -->
      <rect x="-70" y="-85" width="35" height="80" class="sol"/>
      <rect x="35"  y="-85" width="35" height="80" class="sol"/>
      <line x1="-35" y1="-85" x2="-30" y2="-85" stroke="#1e293b" stroke-width="1"/>
      <line x1="30"  y1="-85" x2="35"  y2="-85" stroke="#1e293b" stroke-width="1"/>
      <text class="ff-label" y="15">6U</text>
      <text class="ff-mass"  y="30">≤ 12 kg</text>
    </g>
    <!-- 12U -->
    <g transform="translate(570 130)">
      <rect x="-35" y="-90" width="70" height="90" class="ff-stroke"/>
      <rect x="-32" y="-87" width="64" height="84" class="sol" opacity="0.6"/>
      <rect x="-80" y="-88" width="42" height="84" class="sol"/>
      <rect x="38"  y="-88" width="42" height="84" class="sol"/>
      <line x1="-38" y1="-85" x2="-35" y2="-85" stroke="#1e293b" stroke-width="1"/>
      <line x1="35"  y1="-85" x2="38"  y2="-85" stroke="#1e293b" stroke-width="1"/>
      <!-- thruster -->
      <rect x="-6" y="0" width="12" height="8" fill="#f97316" stroke="#1e293b" stroke-width="0.8"/>
      <text class="ff-label" y="22">12U</text>
      <text class="ff-mass"  y="37">≤ 24 kg</text>
    </g>
  </g>

  <!-- Group: Other platforms -->
  <g transform="translate(60 290)">
    <text class="ff-fam" x="0" y="0">Other platforms</text>
    <line x1="0" y1="10" x2="1080" y2="10" stroke="#94a3b8" stroke-width="1"/>

    <!-- rocket_payload -->
    <g transform="translate(80 80)">
      <path d="M 0 -55 L -12 -40 L -12 25 L 12 25 L 12 -40 Z" class="ff-stroke"/>
      <path d="M -12 25 L -24 40 M 12 25 L 24 40" class="ff-stroke" fill="none" stroke-width="1.4"/>
      <rect x="-8" y="-30" width="16" height="8" fill="#fbbf24"/>
      <path d="M -8 25 L -2 40 L 2 40 L 8 25 Z" fill="#ef4444"/>
      <text class="ff-label" y="55">rocket</text>
      <text class="ff-mass"  y="70">≤ 10 kg</text>
    </g>

    <!-- hab_payload -->
    <g transform="translate(260 80)">
      <circle cx="0" cy="-30" r="24" class="ff-stroke"/>
      <path d="M -8 -10 Q 0 2 8 -10 Z" fill="#94a3b8"/>
      <line x1="-4" y1="-8" x2="-12" y2="25" stroke="#475569"/>
      <line x1="4"  y1="-8" x2="12"  y2="25" stroke="#475569"/>
      <rect x="-14" y="25" width="28" height="18" rx="2" fill="#fbbf24" stroke="#1e293b" stroke-width="0.8"/>
      <text class="ff-label" y="60">HAB</text>
      <text class="ff-mass"  y="75">≤ 4 kg</text>
    </g>

    <!-- drone_small -->
    <g transform="translate(440 80)">
      <line x1="-38" y1="-30" x2="38" y2="30" stroke="#1e293b" stroke-width="2"/>
      <line x1="-38" y1="30"  x2="38" y2="-30" stroke="#1e293b" stroke-width="2"/>
      <circle cx="-38" cy="-30" r="10" fill="#1e293b" opacity="0.2" stroke="#1e293b" stroke-width="1"/>
      <circle cx="38"  cy="-30" r="10" fill="#1e293b" opacity="0.2" stroke="#1e293b" stroke-width="1"/>
      <circle cx="-38" cy="30"  r="10" fill="#1e293b" opacity="0.2" stroke="#1e293b" stroke-width="1"/>
      <circle cx="38"  cy="30"  r="10" fill="#1e293b" opacity="0.2" stroke="#1e293b" stroke-width="1"/>
      <rect x="-12" y="-10" width="24" height="20" rx="3" class="ff-stroke"/>
      <text class="ff-label" y="55">drone</text>
      <text class="ff-mass"  y="70">≤ 5 kg</text>
    </g>

    <!-- rover_small -->
    <g transform="translate(620 80)">
      <rect x="-26" y="-25" width="52" height="30" rx="3" class="ff-stroke"/>
      <rect x="-20" y="-35" width="18" height="10" class="sol"/>
      <rect x="2"   y="-35" width="18" height="10" class="sol"/>
      <circle cx="-18" cy="10" r="8" fill="#334155" stroke="#1e293b" stroke-width="1"/>
      <circle cx="18"  cy="10" r="8" fill="#334155" stroke="#1e293b" stroke-width="1"/>
      <text class="ff-label" y="40">rover</text>
      <text class="ff-mass"  y="55">≤ 30 kg</text>
    </g>

    <!-- custom -->
    <g transform="translate(800 80)">
      <rect x="-26" y="-30" width="52" height="55" rx="4" fill="none" stroke="#6366f1" stroke-width="2" stroke-dasharray="4 3"/>
      <text x="0" y="3" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#6366f1">?</text>
      <text class="ff-label" y="45">custom</text>
      <text class="ff-mass"  y="60">user-defined</text>
    </g>

    <!-- Arrow — extendable -->
    <g transform="translate(990 80)">
      <rect x="-35" y="-30" width="70" height="55" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
      <text x="0" y="-5" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#15803d">form_factors.py</text>
      <text x="0" y="10" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="9" fill="#166534">register → done</text>
      <text class="ff-label" y="45" fill="#15803d">registry</text>
      <text class="ff-mass"  y="60" fill="#16a34a">any shape</text>
    </g>
  </g>

  <!-- Footer tagline -->
  <text x="600" y="406" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="12" fill="#64748b">
    Same firmware source → <tspan fill="#1e40af" font-weight="700">make target-&lt;profile&gt;</tspan> → 9 build targets · validator enforces mass / volume / power envelopes at config time
  </text>
</svg>
