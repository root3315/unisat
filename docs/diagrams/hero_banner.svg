<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" role="img" aria-label="UniSat — universal modular satellite platform">
  <defs>
    <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a1929"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="panelGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1e40af"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <radialGradient id="earthGrad" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#60a5fa"/>
      <stop offset="1" stop-color="#1e3a8a"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="340" fill="url(#skyGrad)"/>

  <!-- Stars -->
  <g fill="#e2e8f0" opacity="0.8">
    <circle cx="80"   cy="40"  r="1"/>
    <circle cx="180"  cy="70"  r="1.3"/>
    <circle cx="260"  cy="28"  r="1"/>
    <circle cx="340"  cy="55"  r="0.8"/>
    <circle cx="420"  cy="90"  r="1.1"/>
    <circle cx="540"  cy="38"  r="1"/>
    <circle cx="690"  cy="60"  r="1.2"/>
    <circle cx="820"  cy="30"  r="0.9"/>
    <circle cx="900"  cy="80"  r="1"/>
    <circle cx="990"  cy="50"  r="1.3"/>
    <circle cx="1080" cy="95"  r="1"/>
    <circle cx="1140" cy="35"  r="1.1"/>
    <circle cx="120"  cy="120" r="0.9"/>
    <circle cx="480"  cy="130" r="1"/>
    <circle cx="760"  cy="120" r="0.8"/>
    <circle cx="1030" cy="135" r="1"/>
  </g>

  <!-- Orbit arc -->
  <path d="M 40 280 Q 600 110 1160 280" stroke="#38bdf8" stroke-width="1.5" fill="none" stroke-dasharray="6 4" opacity="0.4"/>

  <!-- Earth chunk bottom right -->
  <circle cx="1320" cy="640" r="500" fill="url(#earthGrad)" opacity="0.3"/>

  <!-- Satellite body (CubeSat) -->
  <g transform="translate(95 180)">
    <!-- solar panels -->
    <rect x="-95" y="-20" width="80" height="40" rx="3" fill="url(#panelGrad)" stroke="#0f172a" stroke-width="1.2"/>
    <rect x="75"  y="-20" width="80" height="40" rx="3" fill="url(#panelGrad)" stroke="#0f172a" stroke-width="1.2"/>
    <g stroke="#0a1929" stroke-width="0.6">
      <line x1="-75" y1="-20" x2="-75" y2="20"/><line x1="-55" y1="-20" x2="-55" y2="20"/>
      <line x1="-35" y1="-20" x2="-35" y2="20"/>
      <line x1="35"  y1="-20" x2="35"  y2="20"/><line x1="55"  y1="-20" x2="55"  y2="20"/>
      <line x1="75"  y1="-20" x2="75"  y2="20"/>
    </g>
    <!-- body -->
    <rect x="-20" y="-30" width="40" height="60" rx="4" fill="#f1f5f9" stroke="#0f172a" stroke-width="1.5"/>
    <rect x="-15" y="-25" width="30" height="15" fill="#0ea5e9" opacity="0.6"/>
    <circle cx="0" cy="5" r="4" fill="#fbbf24"/>
    <!-- antenna -->
    <line x1="0" y1="-30" x2="0" y2="-55" stroke="#e2e8f0" stroke-width="1.2"/>
    <circle cx="0" cy="-58" r="2" fill="#fbbf24"/>
  </g>

  <!-- Title -->
  <g text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" fill="#f8fafc">
    <text x="600" y="115" font-size="68" font-weight="700" letter-spacing="2">UniSat</text>
    <text x="600" y="155" font-size="20" font-weight="500" fill="#38bdf8" letter-spacing="1.2">
      Universal Modular Satellite Platform
    </text>
    <text x="600" y="185" font-size="14" fill="#94a3b8" letter-spacing="0.8">
      CanSat · CubeSat 1U – 12U · HAB · Rocket · Drone · Rover
    </text>
  </g>

  <!-- Version chip -->
  <g transform="translate(600 215)">
    <rect x="-85" y="0" width="170" height="26" rx="13" fill="#1e40af" opacity="0.85" stroke="#38bdf8" stroke-width="1"/>
    <text text-anchor="middle" x="0" y="18" fill="#f8fafc" font-family="'Segoe UI', sans-serif" font-size="13" font-weight="600">
      v1.4.1 · TRL-5 hardened
    </text>
  </g>

  <!-- Feature stripes below -->
  <g transform="translate(600 270)" font-family="'Segoe UI', sans-serif" text-anchor="middle">
    <g transform="translate(-330 0)">
      <circle r="14" fill="#1e40af" stroke="#38bdf8" stroke-width="1.5"/>
      <text y="5" fill="#f8fafc" font-size="14" font-weight="700">14</text>
      <text y="32" fill="#cbd5e1" font-size="11">form factors</text>
    </g>
    <g transform="translate(-165 0)">
      <circle r="14" fill="#1e40af" stroke="#38bdf8" stroke-width="1.5"/>
      <text y="5" fill="#f8fafc" font-size="11" font-weight="700">28 / 435</text>
      <text y="32" fill="#cbd5e1" font-size="11">C / Py tests</text>
    </g>
    <g transform="translate(0 0)">
      <circle r="14" fill="#1e40af" stroke="#38bdf8" stroke-width="1.5"/>
      <text y="5" fill="#f8fafc" font-size="11" font-weight="700">HMAC</text>
      <text y="32" fill="#cbd5e1" font-size="11">SHA-256 auth</text>
    </g>
    <g transform="translate(165 0)">
      <circle r="14" fill="#1e40af" stroke="#38bdf8" stroke-width="1.5"/>
      <text y="5" fill="#f8fafc" font-size="11" font-weight="700">FDIR</text>
      <text y="32" fill="#cbd5e1" font-size="11">12 faults · 3-tier</text>
    </g>
    <g transform="translate(330 0)">
      <circle r="14" fill="#1e40af" stroke="#38bdf8" stroke-width="1.5"/>
      <text y="5" fill="#f8fafc" font-size="10" font-weight="700">STM32</text>
      <text y="32" fill="#cbd5e1" font-size="11">31.6 KB flash</text>
    </g>
  </g>

  <!-- Right side: 3 form-factor silhouettes -->
  <g transform="translate(1050 170)" stroke="#0f172a" stroke-width="1.4">
    <!-- CanSat (can shape) -->
    <g transform="translate(-75 0)">
      <ellipse cx="0" cy="-30" rx="14" ry="4" fill="#e2e8f0"/>
      <rect x="-14" y="-30" width="28" height="55" fill="#cbd5e1"/>
      <ellipse cx="0" cy="25" rx="14" ry="4" fill="#94a3b8"/>
      <text text-anchor="middle" y="50" fill="#94a3b8" font-family="'Segoe UI', sans-serif" font-size="10">CanSat</text>
    </g>
    <!-- CubeSat 3U -->
    <g transform="translate(0 0)">
      <rect x="-14" y="-35" width="28" height="70" rx="2" fill="#f1f5f9"/>
      <rect x="-10" y="-30" width="20" height="10" fill="#0ea5e9" opacity="0.7"/>
      <rect x="-10" y="-15" width="20" height="10" fill="#0ea5e9" opacity="0.7"/>
      <rect x="-10" y="0"   width="20" height="10" fill="#0ea5e9" opacity="0.7"/>
      <line x1="-14" y1="-35" x2="-14" y2="35"/>
      <line x1="14"  y1="-35" x2="14"  y2="35"/>
      <text text-anchor="middle" y="50" fill="#94a3b8" font-family="'Segoe UI', sans-serif" font-size="10">CubeSat</text>
    </g>
    <!-- HAB balloon -->
    <g transform="translate(75 0)">
      <circle cx="0" cy="-25" r="18" fill="#e2e8f0"/>
      <path d="M -6 -10 Q 0 0 6 -10 Z" fill="#94a3b8"/>
      <line x1="0" y1="-7" x2="-8" y2="18" stroke="#64748b"/>
      <line x1="0" y1="-7" x2="8"  y2="18" stroke="#64748b"/>
      <rect x="-9" y="18" width="18" height="14" rx="2" fill="#fbbf24"/>
      <text text-anchor="middle" y="50" fill="#94a3b8" font-family="'Segoe UI', sans-serif" font-size="10">HAB</text>
    </g>
  </g>
</svg>
