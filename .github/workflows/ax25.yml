name: AX.25

on:
  push:
    branches: [master, "feat/**"]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    # Linux-only: macOS runners cost 10x free minutes and add no
    # platform coverage that Linux doesn't already validate for a
    # pure-C + Python library. The local Docker flow exercises Win
    # compatibility of the VirtualUART shim via Winsock ifdefs.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: |
          pip install pytest hypothesis

      - name: Regenerate golden vectors (sanity)
        run: |
          python scripts/gen_golden_vectors.py

      - name: Python unit tests
        run: |
          cd ground-station
          python -m pytest tests/test_ax25.py -v

      - name: Configure firmware host build
        run: |
          cd firmware
          cmake -B build -S .

      - name: Build firmware host tests + sitl_fw
        run: |
          cd firmware
          cmake --build build

      - name: Run C unit tests via ctest
        run: |
          cd firmware
          ctest --test-dir build --output-on-failure

      - name: End-to-end SITL demo
        run: |
          python scripts/demo.py --port 52100 --timeout 30

      - name: Regenerate verification trace matrix
        run: |
          python scripts/gen_trace_matrix.py
          head -50 docs/verification/ax25_trace_matrix.md
